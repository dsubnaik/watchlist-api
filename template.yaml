AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Watchlist API

Globals:
  Function:
    Timeout: 10

Resources:
  WatchlistFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      Architectures:
        - x86_64
      Policies:
        - DynamoDBCrudPolicy:
            TableName: watchlist
      Events:
        AddItem:
          Type: Api
          Properties:
            Path: /items
            Method: post
        GetItems:
          Type: Api
          Properties:
            Path: /items
            Method: get
        GetItem:
          Type: Api
          Properties:
            Path: /items/{id}
            Method: get
        UpdateItem:
          Type: Api
          Properties:
            Path: /items/{id}
            Method: patch
        DeleteItem:
          Type: Api
          Properties:
            Path: /items/{id}
            Method: delete
    Metadata:
      DockerTag: latest
      DockerContext: ./watchlist
      Dockerfile: Dockerfile

  WatchlistTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: watchlist
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: item_id
          AttributeType: S
      KeySchema:
        - AttributeName: item_id
          KeyType: HASH

Outputs:
  WatchlistApi:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/items"
